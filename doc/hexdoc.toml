modid = "typecasting"
book = "hexcasting:thehexbook"

resource_dirs = [  # top takes priority
    "resources",
    "{$_common.src}/main/resources",
    { path="{$_common.src}/generated/resources", required=false },
    "{$_fabric.src}/main/resources",
    { path="{$_fabric.src}/generated/resources", required=false },
    "{$_forge.src}/main/resources",
    { path="{$_forge.src}/generated/resources", required=false },
    { modid="hexcasting" },
    { modid="minecraft" },
    { modid="hexdoc" },
]
export_dir = "src/hexdoc_typecasting/_export/generated"

[template]
icon = "{$_common.src}/main/resources/assets/typecasting/icon.png"
include = [
    "typecasting",
    "hexcasting",
    "hexdoc",
]

[template.args]
mod_name = "Type Casting"
author = "object-Object"
show_landing_text = false

[extra.hexcasting]
# NOTE: "!Raw" means "don't apply variable interpolation to this value"
_pattern_regex = { "!Raw"='make\(\s*"(?P<name>[^"]+)",\s*HexDir\.(?P<startdir>\w+),\s*"(?P<signature>[qweasd]+)"' }

[[extra.hexcasting.pattern_stubs]]
path = "{$_common.kotlin}/registry/TypeCastingActions.kt"
regex = "{^_pattern_regex}"

# platforms

[_common]
src = "../common/src"
java = "{src}/main/java/gay/object/typecasting"
kotlin = "{src}/main/kotlin/gay/object/typecasting"

[_fabric]
src = "../fabric/src"
java = "{src}/main/java/gay/object/typecasting/fabric"
kotlin = "{src}/main/kotlin/gay/object/typecasting/fabric"

[_forge]
src = "../forge/src"
java = "{src}/main/java/gay/object/typecasting/forge"
kotlin = "{src}/main/kotlin/gay/object/typecasting/forge"
